<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login</title>
  <link rel="stylesheet" href="../tokens.css" />
</head>
<body>
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg-subtle)">
    <div class="card" style="width:100%;max-width:360px;padding:32px;text-align:center;background:var(--surface);box-shadow:var(--shadow-pop)">
      <div class="brand-mark" style="width:40px;height:40px;border-radius:var(--r-lg);margin:0 auto 18px">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      </div>
      <h1 style="font-size:18px;font-weight:600;letter-spacing:-.01em;margin:0 0 6px">Code Smell Detector</h1>
      <p class="secondary" style="margin:0 0 22px;font-size:13px;line-height:1.5">Catch maintainability issues in your pull requests before they merge.</p>

      <button class="btn btn-primary" style="width:100%;justify-content:center;height:38px">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.5 2 2 6.5 2 12c0 4.4 2.9 8.2 6.8 9.5.5.1.7-.2.7-.5v-1.7c-2.8.6-3.4-1.3-3.4-1.3-.5-1.2-1.1-1.5-1.1-1.5-.9-.6.1-.6.1-.6 1 .1 1.5 1 1.5 1 .9 1.5 2.3 1.1 2.9.8.1-.6.3-1.1.6-1.3-2.2-.3-4.6-1.1-4.6-5 0-1.1.4-2 1-2.7-.1-.3-.4-1.3.1-2.7 0 0 .8-.3 2.7 1a9.4 9.4 0 015 0c1.9-1.3 2.7-1 2.7-1 .5 1.4.2 2.4.1 2.7.6.7 1 1.6 1 2.7 0 3.9-2.3 4.7-4.6 5 .4.3.7.9.7 1.9v2.8c0 .3.2.6.7.5A10 10 0 0022 12c0-5.5-4.5-10-10-10z"/></svg>
        Continue with GitHub
      </button>

      <p class="field-help" style="margin-top:18px">By continuing you agree to the Terms of Service and Privacy Policy.</p>
    </div>
  </div>
</body>
</html>
