<!-- @dsCard group="Components" name="Buttons" subtitle="Primary (mono) / secondary / ghost / danger · sm · icon" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Buttons</title>
  <link rel="stylesheet" href="../tokens.css" />
</head>
<body>
  <div class="page stack">
    <div>
      <p class="eyebrow" style="margin:0 0 10px">Default (32px)</p>
      <div class="row">
        <button class="btn btn-primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          Connect repository
        </button>
        <button class="btn btn-secondary">Edit configuration</button>
        <button class="btn btn-ghost">Cancel</button>
        <button class="btn btn-danger">Disconnect</button>
      </div>
    </div>

    <div>
      <p class="eyebrow" style="margin:0 0 10px">Small (28px)</p>
      <div class="row">
        <button class="btn btn-primary btn-sm">Run analysis</button>
        <button class="btn btn-secondary btn-sm">Re-run</button>
        <button class="btn btn-ghost btn-sm">Dismiss</button>
      </div>
    </div>

    <div>
      <p class="eyebrow" style="margin:0 0 10px">Icon only</p>
      <div class="row">
        <button class="btn btn-secondary btn-icon" title="Refresh">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 11-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg>
        </button>
        <button class="btn btn-ghost btn-icon" title="More">
          <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="19" cy="12" r="1.6"/></svg>
        </button>
        <button class="btn btn-secondary btn-icon btn-sm" title="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 00.3 1.9l.1.1a2 2 0 11-2.8 2.8l-.1-.1a1.7 1.7 0 00-1.9-.3 1.7 1.7 0 00-1 1.5V21a2 2 0 11-4 0v-.1a1.7 1.7 0 00-1-1.5 1.7 1.7 0 00-1.9.3l-.1.1a2 2 0 11-2.8-2.8l.1-.1a1.7 1.7 0 00.3-1.9 1.7 1.7 0 00-1.5-1H3a2 2 0 110-4h.1a1.7 1.7 0 001.5-1 1.7 1.7 0 00-.3-1.9l-.1-.1a2 2 0 112.8-2.8l.1.1a1.7 1.7 0 001.9.3H9a1.7 1.7 0 001-1.5V3a2 2 0 114 0v.1a1.7 1.7 0 001 1.5 1.7 1.7 0 001.9-.3l.1-.1a2 2 0 112.8 2.8l-.1.1a1.7 1.7 0 00-.3 1.9V9a1.7 1.7 0 001.5 1H21a2 2 0 110 4h-.1a1.7 1.7 0 00-1.5 1z"/></svg>
        </button>
      </div>
    </div>

    <div>
      <p class="eyebrow" style="margin:0 0 10px">Disabled</p>
      <div class="row">
        <button class="btn btn-primary" style="opacity:.45;cursor:not-allowed">Connect repository</button>
        <button class="btn btn-secondary" style="opacity:.45;cursor:not-allowed">Edit configuration</button>
      </div>
    </div>
  </div>
</body>
</html>
