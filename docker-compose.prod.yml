# Production stack: Traefik (TLS + domain) → Next.js web, plus worker, Postgres, Redis.
#
#   cp .env.production.example .env.production   # then fill in real values
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# Traefik terminates HTTPS (Let's Encrypt) and routes ${DOMAIN} to the web service.
# Only Traefik publishes ports (80/443); Postgres and Redis stay on the internal
# network and are never exposed to the host.

name: csd-prod

services:
  traefik:
    image: traefik:v3.3
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # Global HTTP → HTTPS redirect
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entryPoint.scheme=https
      # Let's Encrypt via HTTP-01 challenge
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.httpchallenge=true
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - edge

  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  # One-shot: apply Prisma migrations, then exit. web/worker wait for success.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    command: ["npm", "run", "db:deploy", "-w", "packages/core"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    restart: "no"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        # Inlined at build time → dashboard's "Admin panel" link points to admin host.
        NEXT_PUBLIC_ADMIN_URL: https://${ADMIN_DOMAIN}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      # Auth.js v5 behind a reverse proxy
      AUTH_URL: https://${DOMAIN}
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_GITHUB_ID: ${AUTH_GITHUB_ID}
      AUTH_GITHUB_SECRET: ${AUTH_GITHUB_SECRET}
      # GitHub App (PR comment bot — Luồng B)
      GITHUB_APP_ID: ${GITHUB_APP_ID}
      GITHUB_APP_SLUG: ${GITHUB_APP_SLUG}
      GITHUB_APP_CLIENT_ID: ${GITHUB_APP_CLIENT_ID}
      GITHUB_APP_CLIENT_SECRET: ${GITHUB_APP_CLIENT_SECRET}
      GITHUB_APP_WEBHOOK_SECRET: ${GITHUB_APP_WEBHOOK_SECRET}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY}
      # SePay (VietQR bank-transfer payments)
      SEPAY_WEBHOOK_API_KEY: ${SEPAY_WEBHOOK_API_KEY}
      SEPAY_BANK_ACCOUNT: ${SEPAY_BANK_ACCOUNT}
      SEPAY_BANK_CODE: ${SEPAY_BANK_CODE}
      SEPAY_ACCOUNT_NAME: ${SEPAY_ACCOUNT_NAME}
      # OpenRouter (LLM: Overview indexing + PR analysis)
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL_MAP: ${OPENROUTER_MODEL_MAP}
      OPENROUTER_MAX_TOKENS: ${OPENROUTER_MAX_TOKENS}
      OPENROUTER_APP_URL: ${OPENROUTER_APP_URL}
      OPENROUTER_APP_TITLE: ${OPENROUTER_APP_TITLE}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    labels:
      - traefik.enable=true
      - traefik.docker.network=csd-prod_edge
      - traefik.http.routers.web.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.web.entrypoints=websecure
      - traefik.http.routers.web.tls=true
      - traefik.http.routers.web.tls.certresolver=le
      - traefik.http.services.web.loadbalancer.server.port=3000
    networks:
      - edge
      - internal

  # ── Admin panel at ${ADMIN_DOMAIN} (e.g. admin.mergetrack.site).
  #   Has its OWN GitHub login → needs a separate GitHub OAuth App with callback
  #   https://${ADMIN_DOMAIN}/api/auth/callback/github. Shares the same DB/users.
  admin:
    build:
      context: .
      dockerfile: Dockerfile
      target: admin-runner
      args:
        # Inlined at build time → admin's "Mở Dashboard" link points to the dashboard host.
        NEXT_PUBLIC_DASHBOARD_URL: https://${DOMAIN}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      AUTH_URL: https://${ADMIN_DOMAIN}
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_GITHUB_ID: ${ADMIN_AUTH_GITHUB_ID}
      AUTH_GITHUB_SECRET: ${ADMIN_AUTH_GITHUB_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    labels:
      - traefik.enable=true
      - traefik.docker.network=csd-prod_edge
      - traefik.http.routers.admin.rule=Host(`${ADMIN_DOMAIN}`)
      - traefik.http.routers.admin.entrypoints=websecure
      - traefik.http.routers.admin.tls=true
      - traefik.http.routers.admin.tls.certresolver=le
      - traefik.http.services.admin.loadbalancer.server.port=3000
    networks:
      - edge
      - internal

  # ── Landing site (marketing) at the apex ${LANDING_DOMAIN} (+ www).
  #   The dashboard keeps ${DOMAIN} (e.g. app.mergetrack.site); landing takes
  #   the apex. NEXT_PUBLIC_* are inlined at BUILD time, hence passed as build args.
  landing:
    build:
      context: .
      dockerfile: Dockerfile
      target: landing-runner
      args:
        NEXT_PUBLIC_DASHBOARD_URL: https://${DOMAIN}
        NEXT_PUBLIC_SITE_URL: https://${LANDING_DOMAIN}
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.docker.network=csd-prod_edge
      - "traefik.http.routers.landing.rule=Host(`${LANDING_DOMAIN}`) || Host(`www.${LANDING_DOMAIN}`)"
      - traefik.http.routers.landing.entrypoints=websecure
      - traefik.http.routers.landing.tls=true
      - traefik.http.routers.landing.tls.certresolver=le
      - traefik.http.services.landing.loadbalancer.server.port=3000
    networks:
      - edge

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      GITHUB_APP_ID: ${GITHUB_APP_ID}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY}
      # OpenRouter (LLM: Overview indexing + PR analysis) — worker runs the jobs
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL_MAP: ${OPENROUTER_MODEL_MAP}
      OPENROUTER_MAX_TOKENS: ${OPENROUTER_MAX_TOKENS}
      OPENROUTER_APP_URL: ${OPENROUTER_APP_URL}
      OPENROUTER_APP_TITLE: ${OPENROUTER_APP_TITLE}
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - internal

volumes:
  pgdata:
  redisdata:

networks:
  edge:
  internal:
