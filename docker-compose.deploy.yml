# Deploy stack for the SHARED VPS — pulls prebuilt images, joins the existing
# Traefik edge. Designed to be fully isolated from other projects on the host
# (treklink-production, exe-be-prod): ships NO Traefik, publishes NO host ports,
# project name `mergetrack-prod` prefixes all containers/networks/volumes.
#
# Build & push from the dev machine first (see HUONG-DAN-DEPLOY / chat):
#   docker build --target runner -t $REGISTRY/$IMAGE_NAMESPACE/web:$TAG    --platform linux/amd64 .
#   docker build --target worker -t $REGISTRY/$IMAGE_NAMESPACE/worker:$TAG --platform linux/amd64 .
#   docker push  $REGISTRY/$IMAGE_NAMESPACE/web:$TAG  &&  docker push $REGISTRY/$IMAGE_NAMESPACE/worker:$TAG
#
# On the VPS (in this project's OWN dir, e.g. /opt/app/mergetrack):
#   docker compose -f docker-compose.deploy.yml --env-file .env.production pull
#   docker compose -f docker-compose.deploy.yml --env-file .env.production up -d
#
# The edge Traefik (treklink-edge-traefik-1) owns :80/:443 and the `treklink-edge`
# network; we only ATTACH to it (external) and add labels — never restart/modify it.

name: mergetrack-prod

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  # One-shot: apply Prisma migrations, then exit. web/worker wait for success.
  migrate:
    image: ${REGISTRY}/${IMAGE_NAMESPACE}/worker:${IMAGE_TAG}
    command: ["npm", "run", "db:deploy", "-w", "packages/core"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    restart: "no"

  web:
    image: ${REGISTRY}/${IMAGE_NAMESPACE}/web:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      # Auth.js v5 behind the shared Traefik proxy
      AUTH_URL: https://${DOMAIN}
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_GITHUB_ID: ${AUTH_GITHUB_ID}
      AUTH_GITHUB_SECRET: ${AUTH_GITHUB_SECRET}
      GITHUB_APP_ID: ${GITHUB_APP_ID}
      GITHUB_APP_SLUG: ${GITHUB_APP_SLUG}
      GITHUB_APP_CLIENT_ID: ${GITHUB_APP_CLIENT_ID}
      GITHUB_APP_CLIENT_SECRET: ${GITHUB_APP_CLIENT_SECRET}
      GITHUB_APP_WEBHOOK_SECRET: ${GITHUB_APP_WEBHOOK_SECRET}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY}
      # SePay (VietQR bank-transfer payments)
      SEPAY_WEBHOOK_API_KEY: ${SEPAY_WEBHOOK_API_KEY}
      SEPAY_BANK_ACCOUNT: ${SEPAY_BANK_ACCOUNT}
      SEPAY_BANK_CODE: ${SEPAY_BANK_CODE}
      SEPAY_ACCOUNT_NAME: ${SEPAY_ACCOUNT_NAME}
      # OpenRouter (LLM: Overview indexing + PR analysis)
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL_MAP: ${OPENROUTER_MODEL_MAP}
      OPENROUTER_MAX_TOKENS: ${OPENROUTER_MAX_TOKENS}
      OPENROUTER_APP_URL: ${OPENROUTER_APP_URL}
      OPENROUTER_APP_TITLE: ${OPENROUTER_APP_TITLE}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    # Unique router/service names so they never collide with treklink-production-*.
    labels:
      - traefik.enable=true
      - traefik.docker.network=treklink-edge
      - traefik.http.routers.mergetrack-dashboard.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.mergetrack-dashboard.entrypoints=websecure
      - traefik.http.routers.mergetrack-dashboard.tls.certresolver=letsencrypt
      - traefik.http.services.mergetrack-dashboard.loadbalancer.server.port=3000
    networks:
      - treklink-edge
      - internal

  # ── Landing site (marketing) at the apex ${LANDING_DOMAIN} (+ www).
  #   NEXT_PUBLIC_* are inlined at BUILD time, so build & push from the dev machine:
  #     docker build --target landing-runner --platform linux/amd64 \
  #       --build-arg NEXT_PUBLIC_DASHBOARD_URL=https://app.mergetrack.site \
  #       --build-arg NEXT_PUBLIC_SITE_URL=https://mergetrack.site \
  #       -t $REGISTRY/$IMAGE_NAMESPACE/landing:$TAG .
  #     docker push $REGISTRY/$IMAGE_NAMESPACE/landing:$TAG
  #   Unique router name so it never collides with the dashboard's router.
  landing:
    image: ${REGISTRY}/${IMAGE_NAMESPACE}/landing:${IMAGE_TAG}
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.docker.network=treklink-edge
      - "traefik.http.routers.mergetrack-landing.rule=Host(`${LANDING_DOMAIN}`) || Host(`www.${LANDING_DOMAIN}`)"
      - traefik.http.routers.mergetrack-landing.entrypoints=websecure
      - traefik.http.routers.mergetrack-landing.tls.certresolver=letsencrypt
      - traefik.http.services.mergetrack-landing.loadbalancer.server.port=3000
    networks:
      - treklink-edge

  # ── Admin panel at ${ADMIN_DOMAIN} (e.g. admin.mergetrack.site).
  #   Own GitHub OAuth App (callback https://${ADMIN_DOMAIN}/api/auth/callback/github).
  #   NEXT_PUBLIC_DASHBOARD_URL is inlined at BUILD time → build & push from dev:
  #     docker build --target admin-runner --platform linux/amd64 \
  #       --build-arg NEXT_PUBLIC_DASHBOARD_URL=https://app.mergetrack.site \
  #       -t $REGISTRY/$IMAGE_NAMESPACE/admin:$TAG .
  #     docker push $REGISTRY/$IMAGE_NAMESPACE/admin:$TAG
  admin:
    image: ${REGISTRY}/${IMAGE_NAMESPACE}/admin:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      # Auth.js v5 behind the shared Traefik proxy (admin's own host).
      AUTH_URL: https://${ADMIN_DOMAIN}
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_SECRET: ${NEXTAUTH_SECRET}
      # Admin's OWN GitHub OAuth App (separate from the dashboard's).
      AUTH_GITHUB_ID: ${ADMIN_AUTH_GITHUB_ID}
      AUTH_GITHUB_SECRET: ${ADMIN_AUTH_GITHUB_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    # Unique router/service names so they never collide with other stacks.
    labels:
      - traefik.enable=true
      - traefik.docker.network=treklink-edge
      - traefik.http.routers.mergetrack-admin.rule=Host(`${ADMIN_DOMAIN}`)
      - traefik.http.routers.mergetrack-admin.entrypoints=websecure
      - traefik.http.routers.mergetrack-admin.tls.certresolver=letsencrypt
      - traefik.http.services.mergetrack-admin.loadbalancer.server.port=3000
    networks:
      - treklink-edge
      - internal

  worker:
    image: ${REGISTRY}/${IMAGE_NAMESPACE}/worker:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      GITHUB_APP_ID: ${GITHUB_APP_ID}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY}
      # OpenRouter (LLM: Overview indexing + PR analysis) — worker runs the jobs
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL_MAP: ${OPENROUTER_MODEL_MAP}
      OPENROUTER_MAX_TOKENS: ${OPENROUTER_MAX_TOKENS}
      OPENROUTER_APP_URL: ${OPENROUTER_APP_URL}
      OPENROUTER_APP_TITLE: ${OPENROUTER_APP_TITLE}
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - internal

volumes:
  pgdata:
  redisdata:

networks:
  # The shared edge — created & owned by the treklink stack. We only attach.
  treklink-edge:
    external: true
  # Private to this project → becomes `mergetrack-prod_internal`.
  internal:
